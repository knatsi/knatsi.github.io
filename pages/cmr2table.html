<!DOCTYPE html>
<html>
<head>
    <title>Snip & Extract (No OCR)</title>
    <style>
        body { font-family: Arial; }
        canvas { border: 1px solid #ccc; margin-top: 10px; }
        table { border-collapse: collapse; margin-top: 20px; }
        td, th { border: 1px solid #ccc; padding: 6px 10px; text-align:center;}
        #overlay {
            position: fixed;
            top:0; left:0;
            width:100%; height:100%;
            background: rgba(0,0,0,0.4);
            display:none;
            cursor: crosshair;
        }
    </style>
</head>
<body>

<h2>Snip → Extract (No OCR)</h2>

<label>Mode:</label>
<select id="mode">
    <option value="Stress">Stress</option>
    <option value="Rest">Rest</option>
    <option value="MPR">MPR</option>
</select>

<br><br>

<button onclick="startSnipping()">Start Snipping</button>
<button onclick="processImage()">Extract Data</button>

<div id="overlay"></div>

<canvas id="canvas"></canvas>

<div id="output"></div>

<script>
let overlay = document.getElementById("overlay");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let startX, startY, endX, endY;
let screenshot;

// Start snipping
async function startSnipping() {
    const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
    const video = document.createElement("video");
    video.srcObject = stream;
    await video.play();

    // draw full screen frame
    let tempCanvas = document.createElement("canvas");
    tempCanvas.width = video.videoWidth;
    tempCanvas.height = video.videoHeight;
    let tempCtx = tempCanvas.getContext("2d");
    tempCtx.drawImage(video, 0, 0);

    screenshot = tempCanvas;

    // stop stream
    stream.getTracks().forEach(t => t.stop());

    overlay.style.display = "block";
}

// Overlay selection
overlay.addEventListener("mousedown", e => {
    startX = e.clientX;
    startY = e.clientY;
});

overlay.addEventListener("mouseup", e => {
    endX = e.clientX;
    endY = e.clientY;

    let scaleX = screenshot.width / window.innerWidth;
    let scaleY = screenshot.height / window.innerHeight;

    let sx = startX * scaleX;
    let sy = startY * scaleY;
    let sw = (endX - startX) * scaleX;
    let sh = (endY - startY) * scaleY;

    canvas.width = sw;
    canvas.height = sh;

    ctx.drawImage(screenshot, sx, sy, sw, sh, 0, 0, sw, sh);

    overlay.style.display = "none";
});

// Extract numbers WITHOUT OCR
function processImage() {
    let img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    let data = img.data;

    // Convert to grayscale + threshold
    for (let i = 0; i < data.length; i += 4) {
        let avg = (data[i] + data[i+1] + data[i+2]) / 3;
        let val = avg > 200 ? 255 : 0;
        data[i] = data[i+1] = data[i+2] = val;
    }

    ctx.putImageData(img, 0, 0);

    // Detect rows (16 segments)
    let rowHeight = canvas.height / 18; // includes header + global
    let values = [];

    for (let i = 0; i < 16; i++) {
        let y = Math.floor((i + 1) * rowHeight);

        let val = sampleNumber(y);
        values.push(val);
    }

    let globalVal = sampleNumber(canvas.height - rowHeight);

    render(values, globalVal);
}

// crude number sampling (right side of image)
function sampleNumber(y) {
    let xStart = canvas.width * 0.6;
    let xEnd = canvas.width * 0.95;

    let pixels = ctx.getImageData(xStart, y, xEnd - xStart, 20).data;

    let count = 0;
    for (let i = 0; i < pixels.length; i += 4) {
        if (pixels[i] === 0) count++;
    }

    // crude heuristic → convert density to value placeholder
    // (we’ll refine this next step)
    return count > 50 ? "detected" : "";
}

// Render table
function render(values, globalVal) {
    let mode = document.getElementById("mode").value;

    let html = "<table>";
    html += "<tr><th>Mode</th>";

    for (let i = 1; i <= 16; i++) {
        html += `<th>${i}</th>`;
    }

    html += "<th>GLOBAL</th></tr>";

    html += `<tr><td>${mode}</td>`;
    values.forEach(v => html += `<td>${v}</td>`);
    html += `<td>${globalVal}</td></tr>`;

    html += "</table>";

    document.getElementById("output").innerHTML = html;
}
</script>

</body>
</html>
